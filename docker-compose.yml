
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Task#123#Pass
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672"
      - "15673:15672"

  api:
    build:
      context: ./TaskManagementSystem.Api
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=TaskManagementSystemDb;User Id=sa;Password=Task#123#Pass;TrustServerCertificate=True
      - ConnectionStrings__RabbitMqConnection=amqp://rabbitmq:5672
    ports:
      - "5001:5050"
    depends_on:
      - db
      - rabbitmq

  frontend:
    build:
      context: ./TaskManagementSystem.Client
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:5001/api/
    ports:
      - "8080:80"
    depends_on:
      - api

networks:
  default:
    name: task-hub-network

volumes:
  mssql_data:
